name: Complete 24/7 Pipeline


permissions:
  contents: write

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    paths:
      - 'encrypted_data/**'
      - 'strategies/**'
      - '.github/workflows/backtest.yml'
  workflow_dispatch:

jobs:
  check-completion:
    runs-on: ubuntu-latest
    outputs:
      all_completed: ${{ steps.check.outputs.all_completed }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if all results already exist
        id: check
        run: |
          ALL_COMPLETED=true
          if find strategies -maxdepth 1 -name "*.js" -print -quit | grep -q .; then
            for strategy in strategies/*.js; do
              strat_name="$(basename "$strategy" .js)"
              if ! find results -path "results/${strat_name}/chunk_*/results.enc" -print -quit | grep -q .; then
                ALL_COMPLETED=false
                break
              fi
            done
          fi
          echo "all_completed=$ALL_COMPLETED" >> $GITHUB_OUTPUT

  prepare:
    needs: check-completion
    if: needs.check-completion.outputs.all_completed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      strategies: ${{ steps.list_strategies.outputs.files }}
      chunks: ${{ steps.build_chunks.outputs.chunks }}
    steps:
      - uses: actions/checkout@v5
        with: { token: ${{ secrets.GITHUB_TOKEN }} }

      - uses: actions/cache@v4
        with:
          path: zips
          key: zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-${{ github.run_id }}
          restore-keys: zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-

      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - run: pip install pandas requests

      # ---- Unlock ----
      - name: 🔓 Check for unlock request
        id: unlock
        env: { CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }} }
        run: |
          UNLOCK_FILE="encrypted_data/src/unlock.txt"
          if [ -f "$UNLOCK_FILE" ] && grep -q "^1$" "$UNLOCK_FILE"; then
            echo "🔓 باز کردن قفل..."
            mkdir -p temp_src_restore
            if [ -f encrypted_data/src.enc ]; then
              node -e "
                const crypto=require('crypto'),fs=require('fs');
                const pass=process.env.CODE_PASSWORD;
                const data=fs.readFileSync('encrypted_data/src.enc');
                const key=crypto.scryptSync(pass,'salt',32);
                const iv=data.slice(0,16), enc=data.slice(16);
                const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                fs.writeFileSync('src.tar.gz',dec);
              "
              tar -xzf src.tar.gz -C temp_src_restore
              cp -r temp_src_restore/* encrypted_data/src/
              rm -rf temp_src_restore src.tar.gz
            fi
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git pull --rebase
            rm -f "$UNLOCK_FILE"
            git add "$UNLOCK_FILE"
            git commit -m "remove unlock flag" || true
            git push
          fi

      # ---- ۲۰۲۵/۲۰۲۶ ----
      - name: 🆕 Prepare 2025/2026 data if flag missing
        id: prep_2025
        run: |
          FLAG="encrypted_data/data_2025_2026_done.flag"
          if [ ! -f "$FLAG" ]; then
            echo "processing 2025/2026..."
            python encrypted_data/prepare_2025_2026.py
            touch "$FLAG"
            echo "flag_created=true" >> $GITHUB_OUTPUT
          else
            echo "flag_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Push flag if created
        if: steps.prep_2025.outputs.flag_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git pull --rebase
          git add encrypted_data/data_2025_2026_done.flag
          git commit -m "mark 2025/2026 data prepared" || true
          git push

      # ---- داده‌های اصلی ----
      - name: Decrypt data.enc if exists
        id: data_decrypt
        env: { DATA_PASSWORD: ${{ secrets.DATA_PASSWORD }} }
        run: |
          if [ -f encrypted_data/data.enc ]; then
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.DATA_PASSWORD;
              const data=fs.readFileSync('encrypted_data/data.enc');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16), enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('data.tar.gz',dec);
            "
            mkdir -p data && tar -xzf data.tar.gz -C data && rm data.tar.gz
          fi

      - name: Run main prepare_data.py
        run: python encrypted_data/prepare_data.py

      - name: Rebuild data.enc
        env: { DATA_PASSWORD: ${{ secrets.DATA_PASSWORD }} }
        run: |
          cd data && tar -czf ../data.tar.gz All_Coins_Combined && cd ..
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.DATA_PASSWORD;
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const input=fs.readFileSync('data.tar.gz');
            const enc=Buffer.concat([cipher.update(input),cipher.final()]);
            fs.writeFileSync('encrypted_data/data.enc',Buffer.concat([iv,enc]));
          "
          rm data.tar.gz

      # ---- رمزنگاری مجدد سورس ----
      - name: 8. Check if source files need re-encryption
        id: source_check
        run: |
          NEED=false
          for f in encrypted_data/src/*.js encrypted_data/src/*.py; do
            [ -f "$f" ] && [ -s "$f" ] && NEED=true && break
          done
          echo "need_enc=$NEED" >> $GITHUB_OUTPUT

      - name: 9. Encrypt source files if needed
        if: steps.source_check.outputs.need_enc == 'true'
        env: { CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }} }
        run: |
          tar -czf src.tar.gz -C encrypted_data/src .
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.CODE_PASSWORD;
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const input=fs.readFileSync('src.tar.gz');
            const enc=Buffer.concat([cipher.update(input),cipher.final()]);
            fs.writeFileSync('encrypted_data/src.enc',Buffer.concat([iv,enc]));
          "
          rm src.tar.gz

      - name: 10. Wipe source files content (keep files)
        if: steps.source_check.outputs.need_enc == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git pull --rebase
          for f in encrypted_data/src/*.js encrypted_data/src/*.py; do
            [ -f "$f" ] && echo -n "" > "$f"
          done
          git add encrypted_data/src/
          git commit -m "wipe source file contents" || true
          git push

      # ---- آماده‌سازی برای بکتست ----
      - name: 11. Decrypt src.enc for backtest
        env: { CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }} }
        run: |
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.CODE_PASSWORD;
            const data=fs.readFileSync('encrypted_data/src.enc');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=data.slice(0,16), enc=data.slice(16);
            const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
            const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
            fs.writeFileSync('src.tar.gz',dec);
          "
          tar -xzf src.tar.gz && rm src.tar.gz

      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: npm install papaparse

      - name: List strategies
        id: list_strategies
        run: |
          files=$(find strategies -maxdepth 1 -name "*.js" -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: Build dynamic chunks
        id: build_chunks
        run: |
          cnt=$(find data/All_Coins_Combined -maxdepth 1 -name "*.csv" | wc -l)
          size=25; n=$(( (cnt + size - 1) / size ))
          chunks="["
          for ((i=0; i<n; i++)); do s=$((i*size)); [ $i -gt 0 ] && chunks+=", "; chunks+="$s"; done
          chunks+="]"
          echo "chunks=$chunks" >> $GITHUB_OUTPUT

      - name: Upload prepared artifact
        uses: actions/upload-artifact@v4
        with:
          name: prep
          path: |
            data/
            backtest-core.js
            divergence-detector.js
            run-backtest.js
            strategies/
            node_modules/
            package.json

  backtest:
    needs: [check-completion, prepare]
    if: needs.prepare.outputs.strategies != '[]' && needs.check-completion.outputs.all_completed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        strategy_file: ${{ fromJson(needs.prepare.outputs.strategies) }}
        chunk: ${{ fromJson(needs.prepare.outputs.chunks) }}
    steps:
      - uses: actions/checkout@v5
        with: { token: ${{ secrets.GITHUB_TOKEN }} }
      - uses: actions/download-artifact@v4
        with: { name: prep }
      - uses: actions/setup-node@v4
        with: { node-version: '18' }

      - name: 🩺 Pre‑flight Health Check
        shell: bash
        run: |
          set +e
          echo "=============================================="
          echo "   📊 PRE‑FLIGHT HEALTH REPORT"
          echo "=============================================="
          DATA_DIR="data/All_Coins_Combined"
          [ ! -d "$DATA_DIR" ] && { echo "❌ FATAL: Data directory missing."; exit 1; }
          mapfile -t CSV_FILES < <(find "$DATA_DIR" -maxdepth 1 -name "*.csv" -print0 | xargs -0 ls -1 2>/dev/null)
          echo "✅ Data dir: $DATA_DIR | Total CSV: ${#CSV_FILES[@]}"
          [ ${#CSV_FILES[@]} -gt 0 ] && {
            echo "   First: $(basename "${CSV_FILES[0]}")   Last: $(basename "${CSV_FILES[-1]}")"
            HIGH=0; for f in "${CSV_FILES[@]}"; do LINES=$(wc -l < "$f"); [ "$LINES" -gt 2500 ] && ((HIGH++)); done
            echo "   Files with >2500 candles: $HIGH"
          }
          echo "⚙️  Core JS:"; for cf in backtest-core.js divergence-detector.js run-backtest.js; do [ -f "$cf" ] && echo "   ✅ $cf" || { echo "   ❌ $cf MISSING"; exit 1; }; done
          echo "🧠 Strategy: strategies/${{ matrix.strategy_file }}"; [ -f "strategies/${{ matrix.strategy_file }}" ] || { echo "   ❌ MISSING"; exit 1; }
          echo "✅ All checks passed."

      - name: Run backtest for chunk
        continue-on-error: true
        run: |
          END=$(( ${{ matrix.chunk }} + 24 ))
          node run-backtest.js --strategy-file "strategies/${{ matrix.strategy_file }}" --start-index ${{ matrix.chunk }} --end-index $END
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}

      - name: 🩺 Post‑flight Diagnostics
        if: always()
        run: |
          RES_DIR="results/${{ matrix.strategy_file }}/chunk_${{ matrix.chunk }}_$(( ${{ matrix.chunk }} + 24 ))"
          if [ -d "$RES_DIR" ]; then echo "✅ $RES_DIR exists"; ls -la "$RES_DIR"; else echo "❌ Result dir missing"; echo "   results/ exists? $([ -d results ] && echo yes || echo no)"; echo "   write test: $(touch test_write 2>/dev/null && rm test_write && echo ok || echo fail)"; find . -name "results.enc" 2>/dev/null || echo "   no results.enc found"; fi

      - name: Commit and push results
        if: always()
        run: |
          if find results -name "results.enc" -print -quit | grep -q .; then
            git config user.name "github-actions[bot]"; git config user.email "actions@github.com"
            git add results/; git commit -m "backtest chunk ${{ matrix.chunk }} for ${{ matrix.strategy_file }}" || true
            git pull --rebase; git push
          fi
