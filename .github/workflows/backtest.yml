### VERSION: FINAL (5 backtest groups, full logging, results auto-create) ###
name: Complete 24/7 Pipeline

permissions:
  contents: write
  actions: write

on:
  push:
    paths:
      - 'encrypted_data/**'
      - 'strategies/**'
      - '.github/workflows/backtest.yml'
  workflow_dispatch:

concurrency:
  group: backtest-main
  cancel-in-progress: false

jobs:
  check-completion:
    runs-on: ubuntu-latest
    outputs:
      all_completed: ${{ steps.check.outputs.all_completed }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: بررسی وجود نتایج قبلی
        id: check
        run: |
          echo "all_completed=false" >> $GITHUB_OUTPUT

  prepare:
    needs: check-completion
    if: needs.check-completion.outputs.all_completed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      strategies: ${{ steps.list_strategies.outputs.files }}
    steps:
      - name: 1. دریافت کد مخزن
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. کش فایل‌های ZIP
        uses: actions/cache@v4
        with:
          path: zips
          key: zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-${{ github.run_id }}
          restore-keys: |
            zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-

      - name: 3. راه‌اندازی پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. نصب کتابخانه‌های پایتون
        run: pip install pandas requests

      - name: 0. ساختن پوشه src
        run: mkdir -p encrypted_data/src

      # ------------------------------------------------------------
      #  باز کردن قفل (unlock) - بدون تغییر از کد اصلی شما
      # ------------------------------------------------------------
      - name: 🔓 مدیریت باز کردن قفل
        id: unlock
        env:
          CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          echo "unlocked=false" >> $GITHUB_OUTPUT
          UNLOCK_FILE="encrypted_data/src/unlock.txt"
          FLAG_FILE="encrypted_data/src/.unlocked.flag"

          if [ -f "$UNLOCK_FILE" ] && grep -q "^3$" "$UNLOCK_FILE"; then
            echo "📊 وضعیت unlock=3"
            if [ -d results ]; then
              find results -name "results.enc" -type f | while read ENC; do
                DIR=$(dirname "$ENC")
                node -e "const crypto=require('crypto'),fs=require('fs');const pass=process.env.RESULTS_PASSWORD;const data=fs.readFileSync('$ENC');const key=crypto.scryptSync(pass,'salt',32);const iv=data.slice(0,16),enc=data.slice(16);const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);const dec=Buffer.concat([decipher.update(enc),decipher.final()]);fs.writeFileSync('$DIR/results.tar.gz',dec);"
                tar -xzf "$DIR/results.tar.gz" -C "$DIR" && rm -f "$DIR/results.tar.gz"
              done
              git config user.name "github-actions[bot]" && git config user.email "actions@github.com"
              git add results/
              git commit -m "extract results (unlock 3)" || true
              git pull --rebase && git push
            fi
            rm -f "$UNLOCK_FILE" "$FLAG_FILE"

          elif [ -f "$UNLOCK_FILE" ] && grep -q "^1$" "$UNLOCK_FILE"; then
            echo "🔓 وضعیت unlock=1"
            echo "unlocked=true" >> $GITHUB_OUTPUT

            if [ -f encrypted_data/src.enc ]; then
              mkdir -p temp_src_restore
              node -e "const crypto=require('crypto'),fs=require('fs');const pass=process.env.CODE_PASSWORD;const data=fs.readFileSync('encrypted_data/src.enc');const key=crypto.scryptSync(pass,'salt',32);const iv=data.slice(0,16),enc=data.slice(16);const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);const dec=Buffer.concat([decipher.update(enc),decipher.final()]);fs.writeFileSync('src.tar.gz',dec);"
              tar -xzf src.tar.gz -C temp_src_restore
              mkdir -p encrypted_data/src
              cp -r temp_src_restore/* encrypted_data/src/ && rm -rf temp_src_restore src.tar.gz
              echo "✅ سورس کد استخراج شد."
              touch encrypted_data/src/.unlocked.flag && echo "🏁 پرچم ساخته شد."
            fi

            git config user.name "github-actions[bot]" && git config user.email "actions@github.com"
            
            git add encrypted_data/src/*.js encrypted_data/src/.unlocked.flag 2>/dev/null || true
            git add "$UNLOCK_FILE" 2>/dev/null || true
            
            if [ -f "$UNLOCK_FILE" ]; then
              rm -f "$UNLOCK_FILE"
              git rm --cached "$UNLOCK_FILE" 2>/dev/null || true
              git add "$UNLOCK_FILE" 2>/dev/null || true
            fi
            
            git commit -m "unlock source files" || true
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase
            git stash pop 2>/dev/null || true
            git push

          else
            echo "🧹 پاکسازی فایل‌های JSON نتایج"
            if [ -d "results" ]; then
              find results -type f ! -name "results.enc" \( -name "*.json" -o -name "*.tar.gz" \) -delete
              if find results -type f ! -name "results.enc" | grep -q .; then
                git config user.name "github-actions[bot]" && git config.user.email "actions@github.com"
                git add results/ && git commit -m "cleanup results" || true
                git pull --rebase && git push
              fi
            else
              echo "📁 پوشه results وجود ندارد، نیازی به پاکسازی نیست."
            fi
            echo "🔒 حالت عادی (بدون باز کردن قفل)"
          fi

      # ---------- ۵. آماده‌سازی داده‌های ۲۰۲۵/۲۰۲۶ ----------
      - name: 5. آماده‌سازی داده‌های ۲۰۲۵ و ۲۰۲۶ در صورت نیاز
        id: prep_2025
        run: |
          FLAG="encrypted_data/data_2025_2026_done.flag"
          if [ ! -f "$FLAG" ]; then
            echo "🆕 در حال پردازش داده‌های ۲۰۲۵/۲۰۲۶..."
            python encrypted_data/prepare_2025_2026.py
            touch "$FLAG"
            echo "flag_created=true" >> $GITHUB_OUTPUT
          else
            echo "✅ داده‌ها قبلاً پردازش شده‌اند."
            echo "flag_created=false" >> $GITHUB_OUTPUT
          fi

      - name: 6. ارسال پرچم به مخزن در صورت ایجاد
        if: steps.prep_2025.outputs.flag_created == 'true'
        run: |
          git config user.name "github-actions[bot]" && git config user.email "actions@github.com"
          git pull --rebase
          git add encrypted_data/data_2025_2026_done.flag
          git commit -m "mark 2025/2026 prepared" || true
          git push

      # ---------- داده‌های اصلی ----------
      - name: 7. رمزگشایی data.enc در صورت وجود
        env:
          DATA_PASSWORD: ${{ secrets.DATA_PASSWORD }}
        run: |
          if [ -f encrypted_data/data.enc ]; then
            node -e "const crypto=require('crypto'),fs=require('fs');const pass=process.env.DATA_PASSWORD;const data=fs.readFileSync('encrypted_data/data.enc');const key=crypto.scryptSync(pass,'salt',32);const iv=data.slice(0,16),enc=data.slice(16);const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);const dec=Buffer.concat([decipher.update(enc),decipher.final()]);fs.writeFileSync('data.tar.gz',dec);"
            mkdir -p data && tar -xzf data.tar.gz -C data && rm data.tar.gz
          fi

      - name: 9. بازسازی data.enc
        env:
          DATA_PASSWORD: ${{ secrets.DATA_PASSWORD }}
        run: |
          cd data && tar -czf ../data.tar.gz All_Coins_Combined && cd ..
          node -e "const crypto=require('crypto'),fs=require('fs');const pass=process.env.DATA_PASSWORD;const key=crypto.scryptSync(pass,'salt',32);const iv=crypto.randomBytes(16);const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);const input=fs.readFileSync('data.tar.gz');const enc=Buffer.concat([cipher.update(input),cipher.final()]);fs.writeFileSync('encrypted_data/data.enc',Buffer.concat([iv,enc]));"
          rm data.tar.gz

      # ---------- ۱۰-۱۲ رمزنگاری هوشمند فایل‌های سورس ----------
      - name: 10. تحلیل فایل‌های سورس
        id: source_analysis
        run: |
          ALL_FULL=true; ONE_FULL=false
          for f in encrypted_data/src/*.js encrypted_data/src/*.py; do
            [ -f "$f" ] && [ -s "$f" ] && ONE_FULL=true
            [ -f "$f" ] && [ ! -s "$f" ] && ALL_FULL=false
          done
          echo "all_full=$ALL_FULL" >> $GITHUB_OUTPUT
          echo "one_full=$ONE_FULL" >> $GITHUB_OUTPUT

      - name: 11. رمزنگاری فایل‌های سورس (ادغام هوشمند)
        if: steps.source_analysis.outputs.one_full == 'true' && steps.unlock.outputs.unlocked != 'true'
        env:
          CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }}
        run: |
          if [ "${{ steps.source_analysis.outputs.all_full }}" = "true" ]; then
            tar -czf src.tar.gz -C encrypted_data/src .
          else
            mkdir -p temp_merge
            if [ -f encrypted_data/src.enc ]; then
              node -e "const crypto=require('crypto'),fs=require('fs');const pass=process.env.CODE_PASSWORD;const data=fs.readFileSync('encrypted_data/src.enc');const key=crypto.scryptSync(pass,'salt',32);const iv=data.slice(0,16),enc=data.slice(16);const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);const dec=Buffer.concat([decipher.update(enc),decipher.final()]);fs.writeFileSync('src_old.tar.gz',dec);"
              tar -xzf src_old.tar.gz -C temp_merge && rm src_old.tar.gz
            fi
            for f in encrypted_data/src/*.js encrypted_data/src/*.py; do
              [ -f "$f" ] && [ -s "$f" ] && cp "$f" temp_merge/
            done
            tar -czf src.tar.gz -C temp_merge .
            rm -rf temp_merge
          fi
          node -e "const crypto=require('crypto'),fs=require('fs');const pass=process.env.CODE_PASSWORD;const key=crypto.scryptSync(pass,'salt',32);const iv=crypto.randomBytes(16);const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);const input=fs.readFileSync('src.tar.gz');const enc=Buffer.concat([cipher.update(input),cipher.final()]);fs.writeFileSync('encrypted_data/src.enc',Buffer.concat([iv,enc]));"
          rm src.tar.gz

      - name: 12. پاک کردن محتوای فایل‌های سورس (نگه داشتن فایل‌ها)
        if: steps.source_analysis.outputs.one_full == 'true' && steps.unlock.outputs.unlocked != 'true'
        run: |
          git config user.name "github-actions[bot]" && git config user.email "actions@github.com"
          for f in encrypted_data/src/*.js encrypted_data/src/*.py; do [ -f "$f" ] && echo -n "" > "$f"; done
          rm -f encrypted_data/src/.unlocked.flag
          git add encrypted_data/src/ encrypted_data/src.enc
          git commit -m "wipe source files and update src.enc" || true
          git config merge.ours.driver true && echo '*.enc merge=ours' >> .gitattributes
          git stash --include-untracked 2>/dev/null || true
          git pull --rebase && git stash pop 2>/dev/null || true
          git push

      # ---------- ۱۳-۱۵ رمزگشایی سورس برای بکتست ----------
      - name: 13. رمزگشایی src.enc برای بکتست
        env:
          CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }}
        run: |
          node -e "const crypto=require('crypto'),fs=require('fs');const pass=process.env.CODE_PASSWORD;const data=fs.readFileSync('encrypted_data/src.enc');const key=crypto.scryptSync(pass,'salt',32);const iv=data.slice(0,16),enc=data.slice(16);const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);const dec=Buffer.concat([decipher.update(enc),decipher.final()]);fs.writeFileSync('src.tar.gz',dec);"
          tar -xzf src.tar.gz && rm src.tar.gz

      - name: 14. راه‌اندازی Node.js
        uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: npm install papaparse

      - name: 16. لیست کردن استراتژی‌ها
        id: list_strategies
        run: |
          files=$(find strategies -maxdepth 1 -name "*.js" -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: 18. بارگذاری محیط آماده شده
        uses: actions/upload-artifact@v4
        with:
          name: prep
          path: |
            data/
            encrypted_data/src/
            strategies/
            node_modules/
            package.json

  # ============================================================
  # ۳. بک‌تست – به ۵ گروه تقسیم شده (هر گروه حداکثر ۲۵۰ فایل)
  # ============================================================
  backtest-group-1:
    needs: [check-completion, prepare]
    if: needs.prepare.outputs.strategies != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      max-parallel: 250
      matrix:
        strategy_file: ${{ fromJson(needs.prepare.outputs.strategies) }}
        file_index: [0,1,2,3,4,5,6,7,8, ...] # 0 تا 249 (با 250 ایندکس)
    steps:
      - name: 1. دریافت کد مخزن
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. دریافت محیط آماده شده
        uses: actions/download-artifact@v4
        with:
          name: prep

      - name: 3. راه‌اندازی Node.js
        uses: actions/setup-node@v4
        with: { node-version: '18' }

      - name: 4. ایجاد پوشه results اگر وجود ندارد
        run: mkdir -p results

      - name: 5. اجرای بکتست (لاگ کامل)
        shell: bash
        run: |
          set -x  # <--- فعال‌سازی لاگ کامل
          echo "===== شروع بکتست برای ایندکس فایل ${{ matrix.file_index }} ====="
          echo "استراتژی: ${{ matrix.strategy_file }}"
          echo "مسیر داده: data/All_Coins_Combined"
          echo "================================================================"
          
          node encrypted_data/src/run-backtest.js \
            --strategy-file "strategies/${{ matrix.strategy_file }}" \
            --start-index ${{ matrix.file_index }} \
            --data-dir data/All_Coins_Combined \
            2>&1 | tee backtest-output-${{ matrix.file_index }}.log
          
          EXIT_CODE=$?
          echo "===== پایان بکتست (کد خروجی: $EXIT_CODE) ====="
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ خطا در پردازش فایل ${{ matrix.file_index }}"
            exit 1
          fi
          
          echo "✅ بکتست با موفقیت پایان یافت."
          ls -la results/ || echo "پوشه results خالی است"
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}

      - name: 6. ثبت نتایج در مخزن
        if: always()
        run: |
          if find results -name "results.enc" -print -quit | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git stash --include-untracked 2>/dev/null || true
            git add results/
            git commit -m "بکتست فایل ${{ matrix.file_index }} برای ${{ matrix.strategy_file }}" || true
            git pull --rebase
            git stash pop 2>/dev/null || true
            git push
          else
            echo "هیچ فایل results.enc یافت نشد."
          fi

  # گروه‌های بعدی مشابه‌اند (فقط file_index بازه‌اشان فرق می‌کند)
  backtest-group-2:
    needs: [check-completion, prepare]
    if: needs.prepare.outputs.strategies != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      max-parallel: 250
      matrix:
        strategy_file: ${{ fromJson(needs.prepare.outputs.strategies) }}
        file_index: [250,251,252, ...] # 250 تا 499
    steps:
      # ... دقیقاً همان مراحل بالا ...

  # و به همین ترتیب گروه‌های ۳، ۴ و ۵ با بازه‌های 500-749، 750-999، 1000-1099

  # ============================================================
  # ۴. رمزنگاری نهایی
  # ============================================================
  finalize-encryption:
    needs: [backtest-group-1, backtest-group-2, backtest-group-3, backtest-group-4, backtest-group-5]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: بررسی وجود پوشه results
        id: check_results
        run: |
          if [ -d "results" ] && [ -n "$(ls -A results 2>/dev/null)" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: فشرده‌سازی و رمزنگاری نتایج
        if: steps.check_results.outputs.exists == 'true'
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          tar -czf results.tar.gz results
          node -e "
            const crypto = require('crypto');
            const fs = require('fs');
            const pass = process.env.RESULTS_PASSWORD;
            const key = crypto.scryptSync(pass, 'salt', 32);
            const iv = crypto.randomBytes(16);
            const cipher = crypto.createCipheriv('aes-256-cbc', key, iv);
            const input = fs.readFileSync('results.tar.gz');
            const encrypted = Buffer.concat([cipher.update(input), cipher.final()]);
            fs.writeFileSync('results.enc', Buffer.concat([iv, encrypted]));
          "
          rm -f results.tar.gz && rm -rf results
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add results.enc
          git commit -m "نهایی: نتایج رمزنگاری شده" || true
          git pull --rebase && git push

      - name: فراخوانی چرخه
        if: always()
        run: gh workflow run loop.yml --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
