name: Complete 24/7 Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    paths:
      - 'encrypted_data/**'
      - 'strategies/**'
      - '.github/workflows/backtest.yml'
  workflow_dispatch:

jobs:
  # ============================================================
  #  Job: Idempotency (موقتاً غیرفعال شده – همیشه false)
  # ============================================================
  check-completion:
    runs-on: ubuntu-latest
    outputs:
      all_completed: ${{ steps.check.outputs.all_completed }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if all results already exist
        id: check
        run: |
          # فعلاً همیشه false برگردان تا بک‌تست در هر اجرا تکرار شود
          echo "all_completed=false" >> $GITHUB_OUTPUT

  prepare:
    needs: check-completion
    if: needs.check-completion.outputs.all_completed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      strategies: ${{ steps.list_strategies.outputs.files }}
      chunks:   ${{ steps.build_chunks.outputs.chunks }}
      filenames: ${{ steps.build_chunks.outputs.filenames }}
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Cache ZIP files
        uses: actions/cache@v4
        with:
          path: zips
          key: zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-${{ github.run_id }}
          restore-keys: |
            zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-

      - name: 3. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. Install Python deps
        run: pip install pandas requests

      # ------------------------------------------------------------
      #  🆕 گام صفر: فقط پوشه را بسازد (بدون فایل اضافی)
      # ------------------------------------------------------------
      - name: 0. Ensure src folder exists
        run: mkdir -p encrypted_data/src

      # ------------------------------------------------------------
      #  🔓 مکانیزم Unlock (جدید: پشتیبانی از عدد ۳ برای استخراج نتایج)
      # ------------------------------------------------------------
      - name: 🔓 Check for unlock request (1 = source, 3 = results)
        id: unlock
        env:
          CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          echo "unlocked=false" >> $GITHUB_OUTPUT
          UNLOCK_FILE="encrypted_data/src/unlock.txt"

          # ============================================================
          # [۳] حالت عدد ۳ : استخراج تمام نتایج (results.enc)
          # ============================================================
          if [ -f "$UNLOCK_FILE" ] && grep -q "^3$" "$UNLOCK_FILE"; then
            echo "📊 درخواست استخراج نتایج (عدد ۳) شناسایی شد."

            find results -name "results.enc" -type f | while read ENC; do
              echo "  ⚙️  استخراج: $ENC"
              DIR=$(dirname "$ENC")
              node -e "
                const crypto=require('crypto'),fs=require('fs'),path=require('path');
                const pass=process.env.RESULTS_PASSWORD;
                const data=fs.readFileSync('${ENC}');
                const key=crypto.scryptSync(pass,'salt',32);
                const iv=data.slice(0,16);
                const enc=data.slice(16);
                const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                const tarPath='${DIR}/results.tar.gz';
                fs.writeFileSync(tarPath,dec);
              "
              tar -xzf "$DIR/results.tar.gz" -C "$DIR"
              rm -f "$DIR/results.tar.gz"
            done

            # ثبت تغییرات و push
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add results/
            git commit -m "extract all results (unlock 3)" || true
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase
            git stash pop 2>/dev/null || true
            git push

            rm -f "$UNLOCK_FILE"

          # ============================================================
          # [۱] حالت عدد ۱ : استخراج سورس‌ها (مثل قبل)
          # ============================================================
          elif [ -f "$UNLOCK_FILE" ] && grep -q "^1$" "$UNLOCK_FILE"; then
            echo "🔓 باز کردن قفل (سورس)..."
            echo "unlocked=true" >> $GITHUB_OUTPUT

            if [ -f encrypted_data/src.enc ]; then
              mkdir -p temp_src_restore
              node -e "
                const crypto=require('crypto'),fs=require('fs');
                const pass=process.env.CODE_PASSWORD;
                const data=fs.readFileSync('encrypted_data/src.enc');
                const key=crypto.scryptSync(pass,'salt',32);
                const iv=data.slice(0,16);
                const enc=data.slice(16);
                const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                fs.writeFileSync('src.tar.gz',dec);
              "
              tar -xzf src.tar.gz -C temp_src_restore
              mkdir -p encrypted_data/src
              cp -r temp_src_restore/* encrypted_data/src/
              rm -rf temp_src_restore src.tar.gz
              echo "✅ فایل‌های سورس استخراج شدند."
              touch encrypted_data/src/.unlocked.flag
              echo "🏁 پرچم .unlocked.flag ساخته شد."
            fi

            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add encrypted_data/src/*.js encrypted_data/src/.unlocked.flag 2>/dev/null || true
            git rm --cached "$UNLOCK_FILE" 2>/dev/null || rm -f "$UNLOCK_FILE"
            git commit -m "unlock source files" || true
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase
            git stash pop 2>/dev/null || true
            git push

          else
            # ============================================================
            #  پاک‌سازی فایل‌های JSON قدیمی (اگر unlock.txt ≠ 3)
            # ============================================================
            echo "🧹 پاک‌سازی فایل‌های استخراج‌شده از نتایج (unlock.txt != 3)..."
            find results -type f ! -name "results.enc" \( -name "*.json" -o -name "*.tar.gz" \) -delete
            if find results -type f ! -name "results.enc" | grep -q .; then
              git config user.name "github-actions[bot]"
              git config user.email "actions@github.com"
              git add results/
              git commit -m "cleanup extracted result files (unlock != 3)" || true
              git stash --include-untracked 2>/dev/null || true
              git pull --rebase
              git stash pop 2>/dev/null || true
              git push
            fi
            echo "🔒 حالت عادی. فایل unlock.txt با مقدار '1' یا '3' یافت نشد."
          fi

      # ------------------------------------------------------------
      #  🆕 دانلود و بخش‌بندی داده‌های ۲۰۲۵/۲۰۲۶ (همیشه)
      # ------------------------------------------------------------
      - name: 5. Prepare 2025/2026 data if needed
        id: prep_2025
        run: |
          FLAG="encrypted_data/data_2025_2026_done.flag"
          if [ ! -f "$FLAG" ]; then
            echo "🆕 Processing 2025/2026..."
            python encrypted_data/prepare_2025_2026.py
            touch "$FLAG"
            echo "flag_created=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Already processed."
            echo "flag_created=false" >> $GITHUB_OUTPUT
          fi

      - name: 6. Push flag if created
        if: steps.prep_2025.outputs.flag_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git pull --rebase
          git add encrypted_data/data_2025_2026_done.flag
          git commit -m "mark 2025/2026 prepared" || true
          git push

      # ------------------------------------------------------------
      #  داده‌های اصلی
      # ------------------------------------------------------------
      - name: 7. Decrypt data.enc if exists
        env:
          DATA_PASSWORD: ${{ secrets.DATA_PASSWORD }}
        run: |
          if [ -f encrypted_data/data.enc ]; then
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.DATA_PASSWORD;
              const data=fs.readFileSync('encrypted_data/data.enc');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16);
              const enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('data.tar.gz',dec);
            "
            mkdir -p data && tar -xzf data.tar.gz -C data && rm data.tar.gz
          fi

      - name: 9. Rebuild data.enc
        env:
          DATA_PASSWORD: ${{ secrets.DATA_PASSWORD }}
        run: |
          cd data && tar -czf ../data.tar.gz All_Coins_Combined && cd ..
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.DATA_PASSWORD;
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const input=fs.readFileSync('data.tar.gz');
            const enc=Buffer.concat([cipher.update(input),cipher.final()]);
            fs.writeFileSync('encrypted_data/data.enc',Buffer.concat([iv,enc]));
          "
          rm data.tar.gz

      # ------------------------------------------------------------
      #  🔒 رمزنگاری هوشمند – جلوگیری از پاک شدن فایل‌های سالم
      # ------------------------------------------------------------
      - name: 10. Analyze source files
        id: source_analysis
        run: |
          ALL_FULL=true
          ONE_FULL=false
          FULL_COUNT=0
          for f in encrypted_data/src/*.js encrypted_data/src/*.py; do
            [ -f "$f" ] && [ -s "$f" ] && { FULL_COUNT=$((FULL_COUNT+1)); ONE_FULL=true; }
            [ -f "$f" ] && [ ! -s "$f" ] && ALL_FULL=false
          done
          echo "all_full=$ALL_FULL" >> $GITHUB_OUTPUT
          echo "one_full=$ONE_FULL" >> $GITHUB_OUTPUT
          echo "full_count=$FULL_COUNT" >> $GITHUB_OUTPUT
          echo "Files with content: $FULL_COUNT, all_full=$ALL_FULL"

      - name: 11. Encrypt source files (smart merge)
        if: steps.source_analysis.outputs.one_full == 'true' && steps.unlock.outputs.unlocked != 'true'
        env:
          CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }}
        run: |
          if [ "${{ steps.source_analysis.outputs.all_full }}" = "true" ]; then
            tar -czf src.tar.gz -C encrypted_data/src .
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.CODE_PASSWORD;
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=crypto.randomBytes(16);
              const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
              const input=fs.readFileSync('src.tar.gz');
              const enc=Buffer.concat([cipher.update(input),cipher.final()]);
              fs.writeFileSync('encrypted_data/src.enc',Buffer.concat([iv,enc]));
            "
            rm src.tar.gz
          else
            mkdir -p temp_merge
            if [ -f encrypted_data/src.enc ]; then
              node -e "
                const crypto=require('crypto'),fs=require('fs');
                const pass=process.env.CODE_PASSWORD;
                const data=fs.readFileSync('encrypted_data/src.enc');
                const key=crypto.scryptSync(pass,'salt',32);
                const iv=data.slice(0,16);
                const enc=data.slice(16);
                const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                fs.writeFileSync('src_old.tar.gz',dec);
              "
              tar -xzf src_old.tar.gz -C temp_merge
              rm src_old.tar.gz
            fi
            for f in encrypted_data/src/*.js encrypted_data/src/*.py; do
              [ -f "$f" ] && [ -s "$f" ] && cp "$f" temp_merge/
            done
            tar -czf src.tar.gz -C temp_merge .
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.CODE_PASSWORD;
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=crypto.randomBytes(16);
              const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
              const input=fs.readFileSync('src.tar.gz');
              const enc=Buffer.concat([cipher.update(input),cipher.final()]);
              fs.writeFileSync('encrypted_data/src.enc',Buffer.concat([iv,enc]));
            "
            rm -rf temp_merge src.tar.gz
          fi

      - name: 12. Wipe source files content (keep files)
        if: steps.source_analysis.outputs.one_full == 'true' && steps.unlock.outputs.unlocked != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          for f in encrypted_data/src/*.js encrypted_data/src/*.py; do
            [ -f "$f" ] && echo -n "" > "$f"
          done
          rm -f encrypted_data/src/.unlocked.flag
          git add encrypted_data/src/ encrypted_data/src.enc
          git commit -m "wipe source files and update src.enc" || true
          git config merge.ours.driver true
          echo '*.enc merge=ours' >> .gitattributes
          git stash --include-untracked 2>/dev/null || true
          git pull --rebase
          git stash pop 2>/dev/null || true
          git push

      # ------------------------------------------------------------
      #  آماده‌سازی برای بکتست
      # ------------------------------------------------------------
      - name: 13. Decrypt src.enc for backtest
        env:
          CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }}
        run: |
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.CODE_PASSWORD;
            const data=fs.readFileSync('encrypted_data/src.enc');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=data.slice(0,16);
            const enc=data.slice(16);
            const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
            const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
            fs.writeFileSync('src.tar.gz',dec);
          "
          tar -xzf src.tar.gz && rm src.tar.gz

      - name: 14. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 15. Install Node deps
        run: npm install papaparse

      - name: 16. List strategies
        id: list_strategies
        run: |
          files=$(find strategies -maxdepth 1 -name "*.js" -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: 17. Build file list and chunks
        id: build_chunks
        run: |
          DATA_DIR="data/All_Coins_Combined"
          # ساخت لیست نام فایل‌ها
          FILENAMES=$(find "$DATA_DIR" -maxdepth 1 -name "*.csv" -exec basename {} \; | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "filenames=$FILENAMES" >> $GITHUB_OUTPUT

          # ساخت ایندکس‌ها (هر فایل یک ایندکس جداگانه)
          cnt=$(echo "$FILENAMES" | jq 'length')
          chunks="["
          for ((i=0; i<cnt; i++)); do
            [ $i -gt 0 ] && chunks+=", "
            chunks+="$i"
          done
          chunks+="]"
          echo "chunks=$chunks" >> $GITHUB_OUTPUT
          echo "Total files: $cnt"

      - name: 18. Upload prepared environment
        uses: actions/upload-artifact@v4
        with:
          name: prep
          path: |
            data/
            backtest-core.js
            divergence-detector.js
            run-backtest.js
            strategies/
            node_modules/
            package.json

  backtest:
    needs: [check-completion, prepare]
    if: needs.prepare.outputs.strategies != '[]' && needs.check-completion.outputs.all_completed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        strategy_file: ${{ fromJson(needs.prepare.outputs.strategies) }}
        chunk: ${{ fromJson(needs.prepare.outputs.chunks) }}
        filename: ${{ fromJson(needs.prepare.outputs.filenames) }}
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Download prepared environment
        uses: actions/download-artifact@v4
        with:
          name: prep

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🩺 4. Pre‑flight Health Check
        shell: bash
        run: |
          set +e
          echo "=============================================="
          echo "   📊 PRE‑FLIGHT HEALTH REPORT"
          echo "=============================================="
          DATA_DIR="data/All_Coins_Combined"
          if [ ! -d "$DATA_DIR" ]; then
            echo "❌ FATAL: Data directory missing."
            exit 1
          fi
          mapfile -t CSV_FILES < <(find "$DATA_DIR" -maxdepth 1 -name "*.csv" -print0 | xargs -0 ls -1 2>/dev/null)
          FILE_COUNT=${#CSV_FILES[@]}
          echo "✅ Data directory: $DATA_DIR"
          echo "   Total CSV files: $FILE_COUNT"
          if [ "$FILE_COUNT" -gt 0 ]; then
            FIRST=$(basename "${CSV_FILES[0]}")
            LAST=$(basename "${CSV_FILES[-1]}")
            echo "   First file: $FIRST"
            echo "   Last file : $LAST"
          fi
          echo ""
          echo "Current job: strategy=${{ matrix.strategy_file }}, file=${{ matrix.filename }}"
          echo ""
          echo "⚙️  Core JS files:"
          for cf in backtest-core.js divergence-detector.js run-backtest.js; do
            [ -f "$cf" ] && echo "   ✅ $cf" || { echo "   ❌ $cf MISSING"; exit 1; }
          done
          echo ""
          echo "🧠 Strategy: strategies/${{ matrix.strategy_file }}"
          [ -f "strategies/${{ matrix.strategy_file }}" ] || { echo "   ❌ MISSING"; exit 1; }
          echo "✅ All health checks passed."

      - name: 5. Run backtest for single file
        continue-on-error: true
        run: |
          node run-backtest.js \
            --strategy-file "strategies/${{ matrix.strategy_file }}" \
            --single-file "${{ matrix.filename }}" \
            --data-dir data/All_Coins_Combined
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}

      - name: 🩺 6. Post‑flight Diagnostics
        if: always()
        run: |
          STRAT="${{ matrix.strategy_file }}"
          FILE_NAME="${{ matrix.filename }}"
          RES_DIR="results/${STRAT}/${FILE_NAME}"
          if [ -d "$RES_DIR" ]; then
            echo "✅ $RES_DIR exists"
            ls -la "$RES_DIR"
          else
            echo "❌ Result directory missing. Debug:"
            echo "   results/ exists? $([ -d results ] && echo yes || echo no)"
            echo "   write test: $(touch test_write 2>/dev/null && rm test_write && echo ok || echo fail)"
            find . -name "results.enc" 2>/dev/null || echo "   no results.enc found"
          fi

      - name: 7. Commit and push results
        if: always()
        run: |
          if find results -name "results.enc" -print -quit | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add results/
            git commit -m "backtest ${{ matrix.filename }} for ${{ matrix.strategy_file }}" || true
            git pull --rebase
            git push
          fi
