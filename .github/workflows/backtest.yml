name: Complete 24/7 Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */2 * * *'
  push:
    paths:
      - 'encrypted_data/**'
      - 'strategies/**'
      - '.github/workflows/backtest.yml'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      strategies: ${{ steps.list_strategies.outputs.files }}
      chunks: ${{ steps.build_chunks.outputs.chunks }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache ZIP files
        uses: actions/cache@v4
        with:
          path: zips
          key: zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-${{ github.run_id }}
          restore-keys: |
            zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install pandas requests

      - name: Prepare market data (download & extract)
        id: prep_data
        run: |
          if [ -f encrypted_data/data.enc ]; then
            echo "data_exists=true" >> $GITHUB_OUTPUT
          else
            echo "data_exists=false" >> $GITHUB_OUTPUT
            python encrypted_data/prepare_data.py
          fi

      - name: Build data.enc if missing
        if: steps.prep_data.outputs.data_exists != 'true'
        env:
          DATA_PASSWORD: ${{ secrets.DATA_PASSWORD }}
        run: |
          cd data
          tar -czf ../data.tar.gz All_Coins_Combined
          cd ..
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.DATA_PASSWORD;
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const input=fs.readFileSync('data.tar.gz');
            const enc=Buffer.concat([cipher.update(input),cipher.final()]);
            fs.writeFileSync('encrypted_data/data.enc',Buffer.concat([iv,enc]));
          "
          rm data.tar.gz

      - name: Decrypt data.enc
        env:
          DATA_PASSWORD: ${{ secrets.DATA_PASSWORD }}
        run: |
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.DATA_PASSWORD;
            const data=fs.readFileSync('encrypted_data/data.enc');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=data.slice(0,16);
            const enc=data.slice(16);
            const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
            const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
            fs.writeFileSync('data.tar.gz',dec);
          "
          mkdir -p data
          tar -xzf data.tar.gz -C data
          rm data.tar.gz

      - name: Encrypt source files if needed
        id: enc_src
        env:
          CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }}
        run: |
          if [ -f encrypted_data/src.enc ]; then
            echo "src_exists=true" >> $GITHUB_OUTPUT
          else
            echo "src_exists=false" >> $GITHUB_OUTPUT
            tar -czf src.tar.gz -C encrypted_data/src .
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.CODE_PASSWORD;
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=crypto.randomBytes(16);
              const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
              const input=fs.readFileSync('src.tar.gz');
              const enc=Buffer.concat([cipher.update(input),cipher.final()]);
              fs.writeFileSync('encrypted_data/src.enc',Buffer.concat([iv,enc]));
            "
            rm -rf encrypted_data/src src.tar.gz
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "encrypt source files" || true
            git push
          fi

      - name: Decrypt src.enc
        env:
          CODE_PASSWORD: ${{ secrets.CODE_PASSWORD }}
        run: |
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.CODE_PASSWORD;
            const data=fs.readFileSync('encrypted_data/src.enc');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=data.slice(0,16);
            const enc=data.slice(16);
            const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
            const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
            fs.writeFileSync('src.tar.gz',dec);
          "
          tar -xzf src.tar.gz
          rm src.tar.gz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: npm install papaparse

      - name: List available strategies
        id: list_strategies
        run: |
          files=$(ls strategies/*.js 2>/dev/null | sed 's|strategies/||' | jq -R -s -c 'split("\n")[:-1]')
          echo "files=$files" >> $GITHUB_OUTPUT

      - name: Build dynamic chunks
        id: build_chunks
        run: |
          cnt=$(ls data/All_Coins_Combined/*.csv 2>/dev/null | wc -l)
          size=25
          n=$(( (cnt + size - 1) / size ))
          chunks="["
          for ((i=0; i<n; i++)); do
            s=$((i*size))
            [ $i -gt 0 ] && chunks+=", "
            chunks+="$s"
          done
          chunks+="]"
          echo "chunks=$chunks" >> $GITHUB_OUTPUT

      - name: Upload prepared environment
        uses: actions/upload-artifact@v4
        with:
          name: prep
          path: |
            data/
            backtest-core.js
            divergence-detector.js
            run-backtest.js
            strategies/
            node_modules/
            package.json

  backtest:
    needs: prepare
    if: needs.prepare.outputs.strategies != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      max-parallel: 8
      matrix:
        strategy_file: ${{ fromJson(needs.prepare.outputs.strategies) }}
        chunk: ${{ fromJson(needs.prepare.outputs.chunks) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download prepared environment
        uses: actions/download-artifact@v4
        with:
          name: prep

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run backtest for chunk
        run: |
          END=$(( ${{ matrix.chunk }} + 24 ))
          node run-backtest.js \
            --strategy-file "strategies/${{ matrix.strategy_file }}" \
            --start-index ${{ matrix.chunk }} \
            --end-index $END
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}

      - name: Commit and push encrypted results
        run: |
          if [ -f results/*/chunk_*/results.enc ]; then
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add results/
            git commit -m "backtest chunk ${{ matrix.chunk }} for ${{ matrix.strategy_file }}" || true
            git pull --rebase
            git push
          fi
