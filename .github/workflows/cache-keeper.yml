name: Cache Keeper (Zips)

on:
  schedule:
    - cron: '0 0 */5 * *'

jobs:
  keep-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v4
        with:
          path: zips
          key: zips-${{ hashFiles('encrypted_data/prepare_data.py') }}-${{ github.run_id }}
